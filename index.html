<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Style Fashion | 프리미엄 패션 스토어</title>
    <link rel="stylesheet" href="style.css">
    <!-- Phông chữ tiếng Hàn từ Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 뉴스레터 팝업 (Popup) -->
    <div id="newsletter-popup" class="popup-overlay">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <div class="popup-image"></div>
            <div class="popup-text">
                <h2>첫 구매 10% 할인 쿠폰!</h2>
                <p>지금 가입하고 최신 트렌드 소식과 <br>특별 할인 혜택을 받아보세요.</p>
                <input type="email" placeholder="이메일 주소를 입력하세요" id="email-input">
                <button class="join-btn">지금 가입하기</button>
                <button class="no-thanks-btn" id="close-popup">아니요, 괜찮습니다</button>
            </div>
        </div>
    </div>

    <!-- 네비게이션 (Navigation) -->
    <nav>
        <div class="logo">K-STYLE<span>STORE</span></div>
        <ul class="nav-links">
            <li><a href="#">홈</a></li>
            <li><a href="#">베스트</a></li>
            <li><a href="#">신상품</a></li>
            <li><a href="#">이벤트</a></li>
        </ul>
    </nav>

    <!-- 히어로 섹션 (Hero Section) -->
    <header class="hero">
        <div class="hero-content">
            <h1>2026 SPRING COLLECTION</h1>
            <p>당신만의 스타일을 완성하는 특별한 선택</p>
            <button class="shop-now">지금 쇼핑하기</button>
        </div>
    </header>

    <!-- 상품 리스트 (Product Grid) -->
    <main class="container">
        <h2 class="section-title">신규 등록 상품</h2>
        <div class="product-grid" id="product-list">
            <!-- JavaScript가 여기에 16개의 상품을 생성합니다 -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 K-Style Store. All rights reserved.</p>
        <p>서울특별시 강남구 테헤란로 | 고객센터: 1588-0000</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
